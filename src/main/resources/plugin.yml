main: net.jandie1505.lobbyselector.LobbySelector
name: HubSelector
authors: [jandie1505, bejiihiu]
version: 2.1.0
api-version: 1.21
permissions:
  lobbyselector.use:
    description: Allow usage of the lobby selector
  lobbyselector.silentlobby:
    description: Allow silent lobby
  lobbyselector.admin.reload:
    description: Allow runtime config reload
    default: op
  lobbyselector.admin.debug:
    description: Allow debug mode toggle
    default: op
  lobbyselector.admin.stats:
    description: Allow telemetry stats view
    default: op
  lobbyselector.admin.open:
    description: Allow opening selector for other players
    default: op
commands:
  lobbyselector:
    description: Open the lobby selector
    usage: /lobbyselector
    permission: lobbyselector.use
    aliases: [hub]
website: github.com/jandie1505
depend: [CloudNet-Bridge]
